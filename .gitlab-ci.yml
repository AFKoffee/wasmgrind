# The Docker image that will be used to build your app
image: rust:1.94
create-pages:
  pages:
    # The folder that contains the files to be exposed at the Page URL
    publish: public
  only:
    # This ensures that only commits to the main branch trigger
    # page build and that the source OR book files actually changed
    changes:
      - 'book/**/*'
      - 'crates/**/*'
      - 'src/**/*'
      - 'Cargo.toml'
      - 'Cargo.lock'
    refs:
      - main
  # Functions that should be executed before the build script is run
  before_script:
    - mkdir public
    - cargo install mdbook --version 0.5.2
    - cargo build --workspace --release
  script:
    - cd book
    - mdbook build -d ../public
    - cd ..
    - cargo doc --workspace --release
    - mv target/doc public/wasmgrind-docs-rs
